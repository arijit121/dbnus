<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF Viewer</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      background: #f5f5f5;
      overflow-y: auto;
      font-family: Arial, sans-serif;
    }

    #loading {
      width: 100%;
      padding: 8px;
    }

    .shimmer-page {
      width: 100%;
      max-width: 900px;
      height: 1100px;
      margin: 0 auto;
      background: linear-gradient(90deg,
          #f0f0f0 25%,
          #e0e0e0 50%,
          #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .2);
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    #error {
      display: none;
      color: red;
      padding: 20px;
      word-break: break-word;
    }

    #pdf-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-container {
      margin: 8px 0;
      background: white;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .2);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: auto;
    }
  </style>
</head>

<body>

  <div id="loading">
    <div class="shimmer-page"></div>
  </div>

  <div id="error"></div>

  <div id="pdf-container"></div>

  <script type="module">

    import * as pdfjsLib from './pdf.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      './pdf.worker.mjs';

    const loadingElement =
      document.getElementById('loading');

    const errorElement =
      document.getElementById('error');

    const container =
      document.getElementById('pdf-container');

    let pdf = null;
    const renderedPages = new Map();

    async function renderPage(pageNumber, wrapper) {
      if (renderedPages.has(pageNumber)) {
        return;
      }

      const page = await pdf.getPage(pageNumber);

      const viewport = page.getViewport({
        scale: 1
      });

      const containerWidth = Math.min(
        window.innerWidth,
        900
      );

      // Higher quality
      const scale =
        containerWidth / viewport.width;

      const scaledViewport =
        page.getViewport({ scale });

      const pixelRatio =
        Math.min(
          (window.devicePixelRatio || 1) * 3,
          8
        );

      const canvas =
        document.createElement('canvas');

      const context =
        canvas.getContext('2d', {
          alpha: false
        });

      canvas.width =
        Math.floor(
          scaledViewport.width *
          pixelRatio
        );

      canvas.height =
        Math.floor(
          scaledViewport.height *
          pixelRatio
        );

      canvas.style.width =
        `${scaledViewport.width}px`;

      canvas.style.height =
        `${scaledViewport.height}px`;

      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = 'high';

      wrapper.innerHTML = '';
      wrapper.appendChild(canvas);

      renderedPages.set(pageNumber, {
        page,
        canvas
      });

      await page.render({
        canvasContext: context,
        viewport: scaledViewport,
        transform: [
          pixelRatio,
          0,
          0,
          pixelRatio,
          0,
          0
        ]
      }).promise;
    }

    function unloadPage(pageNumber) {
      const rendered = renderedPages.get(pageNumber);
      if (!rendered) return;

      rendered.page.cleanup();

      rendered.canvas.width = 0;
      rendered.canvas.height = 0;

      renderedPages.delete(pageNumber);

      const wrapper = document.querySelector(
        `[data-page-number="${pageNumber}"]`
      );
      if (wrapper) {
        wrapper.innerHTML = '';
      }
    }

    async function renderPdf() {

      try {

        const urlParams =
          new URLSearchParams(
            window.location.search
          );

        const encodedPdfUrl =
          urlParams.get('file');

        if (!encodedPdfUrl) {
          throw new Error(
            'Missing file query parameter'
          );
        }

        const pdfUrl =
          decodeURIComponent(
            encodedPdfUrl
          );

        if (!pdfUrl.trim()) {
          throw new Error(
            'PDF URL is empty'
          );
        }

        const loadingTask =
          pdfjsLib.getDocument({
            url: pdfUrl,
            maxImageSize: -1,
            useSystemFonts: true,
            isEvalSupported: true,
            cMapPacked: true,
            disableFontFace: false
          });

        loadingTask.onProgress =
          (progress) => {
            console.log(
              'Progress:',
              progress.loaded,
              '/',
              progress.total
            );
          };

        pdf =
          await loadingTask.promise;

        loadingElement.style.display =
          'none';

        for (
          let pageNumber = 1;
          pageNumber <= pdf.numPages;
          pageNumber++
        ) {
          const wrapper =
            document.createElement('div');

          wrapper.className =
            'page-container';

          wrapper.dataset.pageNumber =
            pageNumber;

          wrapper.style.width = '100%';
          wrapper.style.maxWidth = '900px';
          wrapper.style.minHeight = '0px';

          container.appendChild(wrapper);
        }

        const observer =
          new IntersectionObserver(
            async (entries) => {
              for (const entry of entries) {
                const pageNumber =
                  Number(
                    entry.target.dataset.pageNumber
                  );

                if (entry.isIntersecting) {
                  renderPage(
                    pageNumber,
                    entry.target
                  );
                } else {
                  unloadPage(
                    pageNumber
                  );
                }
              }
            },
            {
              rootMargin: '1200px'
            }
          );

        document
          .querySelectorAll('.page-container')
          .forEach(
            (page) => observer.observe(page)
          );

      } catch (e) {

        loadingElement.style.display =
          'none';

        errorElement.style.display =
          'block';

        errorElement.textContent =
          e?.message ||
          String(e);

        console.error(
          'PDF ERROR:',
          e
        );
      }
    }

    renderPdf();

  </script>

</body>

</html>
